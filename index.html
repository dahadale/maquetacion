<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <script src='https://cdn.tailwindcss.com'></script>
    <title>Tabla de Ingresos y Gastos</title>
</head>
<body class='bg-gray-50 p-8'>
    <h2 class='text-xl font-bold mb-4'>Control de Ingresos y Gastos por Vehículo</h2>
    <div class='bg-white shadow overflow-hidden sm:rounded-lg'>
        <table class='min-w-full divide-y divide-gray-200'>
            <thead class='bg-gray-50'>
                <tr>
                    <th class='px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase'>Placa</th>
                    <th class='px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase'>Ingresos</th>
                    <th class='px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase'>Gastos</th>
                    <th class='px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase'>Balance</th>
                </tr>
            </thead>
            <tbody class='bg-white divide-y divide-gray-200'>
                <tr>
                    <td class='px-6 py-4 whitespace-nowrap'>ABC-123</td>
                    <td class='px-6 py-4 whitespace-nowrap'>$500,000</td>
                    <td class='px-6 py-4 whitespace-nowrap'>$200,000</td>
                    <td class='px-6 py-4 whitespace-nowrap font-bold text-green-600'>$300,000</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
