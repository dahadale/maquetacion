<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <script src='https://cdn.tailwindcss.com'></script>
    <title>Dashboard Taxis</title>
</head>
<body class='bg-gray-100 p-8'>
    <h1 class='text-2xl font-bold mb-6'>Dashboard de Gestión de Flota</h1>
    <div class='grid grid-cols-1 md:grid-cols-3 gap-4 mb-8'>
        <div class='bg-white p-4 shadow rounded'>KPI Ingresos: $0</div>
        <div class='bg-white p-4 shadow rounded'>KPI Gastos: $0</div>
        <div class='bg-white p-4 shadow rounded'>Total Flota: 60</div>
    </div>
    <div class='bg-white p-6 shadow rounded'>
        <h2 class='text-lg font-semibold mb-4'>Control de Conductores y Vehículos</h2>
        <table class='w-full text-left'>
            <thead><tr><th>Conductor</th><th>Deuda</th><th>Kilometraje</th><th>Estado Mantenimiento</th></tr></thead>
            <tbody><tr><td>Ejemplo</td><td>$0</td><td>0 km</td><td>Al día</td></tr></tbody>
        </table>
    </div>
</body>
</html>
