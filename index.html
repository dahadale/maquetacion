<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background-color:#09090b; font-family:sans-serif;}</style>
</head>
<body class="text-zinc-100 p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <header>
            <h1 class="text-3xl font-bold">Control de Suministros de Agua</h1>
        </header>

        <!-- Dashboard KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800">
                <p class="text-zinc-500 text-sm">Consumo Total</p>
                <p class="text-4xl font-bold text-blue-400">1,240 <span class="text-base text-zinc-500">unidades</span></p>
            </div>
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800">
                <p class="text-zinc-500 text-sm">Costo Total</p>
                <p class="text-4xl font-bold text-emerald-400">$8,450.00</p>
            </div>
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800">
                <p class="text-zinc-500 text-sm">Proyección Mensual</p>
                <p class="text-4xl font-bold text-amber-400">2,100 <span class="text-base text-zinc-500">uds</span></p>
            </div>
        </div>

        <!-- Simulación Gráfico -->
        <div class="bg-zinc-900 p-8 rounded-lg border border-zinc-800 h-64 flex items-end gap-4">
            <div class="bg-blue-600 w-16 h-3/4"></div>
            <div class="bg-blue-600 w-16 h-1/2"></div>
            <div class="bg-blue-600 w-16 h-full"></div>
            <div class="bg-blue-600 w-16 h-2/3"></div>
            <div class="bg-blue-600 w-16 h-5/6"></div>
        </div>

        <!-- Formulario -->
        <div class="bg-zinc-900 p-8 rounded-lg border border-zinc-800">
            <h2 class="text-xl font-semibold mb-6">Registrar Entrega</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <select class="bg-zinc-800 p-3 rounded border border-zinc-700">
                    <option>Agua en Botella</option>
                    <option>Agua para Dispensador</option>
                </select>
                <input type="number" placeholder="Cantidad" class="bg-zinc-800 p-3 rounded border border-zinc-700">
                <input type="date" class="bg-zinc-800 p-3 rounded border border-zinc-700">
                <input type="text" placeholder="Nombre del receptor" class="bg-zinc-800 p-3 rounded border border-zinc-700">
                <button class="bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold col-span-full">Guardar Registro</button>
            </form>
        </div>
    </div>
</body>
</html>
