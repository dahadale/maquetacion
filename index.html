<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquinaria Pro 24/7</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <header class="mb-8">
        <h1 class="text-3xl font-bold text-yellow-500">Gestión de Maquinaria 24/7</h1>
        <p class="text-gray-400">Control de turnos y mantenimiento obligatorio</p>
    </header>

    <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-gray-800 p-6 rounded-lg border-l-4 border-green-500">
            <h3 class="text-gray-400">Operativas</h3>
            <p class="text-3xl font-bold">8</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border-l-4 border-yellow-500">
            <h3 class="text-gray-400">En Mantenimiento</h3>
            <p class="text-3xl font-bold">2</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border-l-4 border-blue-500">
            <h3 class="text-gray-400">Total Flota</h3>
            <p class="text-3xl font-bold">10</p>
        </div>
    </div>

    <div class="bg-gray-800 rounded-lg p-6 overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="text-gray-400 border-b border-gray-700">
                    <th class="p-4 text-left">Máquina</th>
                    <th class="p-4 text-left">Estado</th>
                    <th class="p-4 text-center">Programación 24h</th>
                    <th class="p-4 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr class="border-b border-gray-700">
                    <td class="p-4 font-bold text-yellow-500">MAQ-001</td>
                    <td class="p-4"><span class="bg-green-900 text-green-300 px-2 py-1 rounded">Operativo</span></td>
                    <td class="p-4 flex gap-1 justify-center">
                        <div class="w-8 h-8 bg-green-600 rounded"></div>
                        <div class="w-8 h-8 bg-yellow-600 rounded"></div>
                        <div class="w-8 h-8 bg-green-600 rounded"></div>
                    </td>
                    <td class="p-4 text-center"><button class="bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">Editar</button></td>
                </tr>
                <tr class="border-b border-gray-700">
                    <td class="p-4 font-bold text-yellow-500">MAQ-002</td>
                    <td class="p-4"><span class="bg-yellow-900 text-yellow-300 px-2 py-1 rounded">Mantenimiento</span></td>
                    <td class="p-4 flex gap-1 justify-center">
                        <div class="w-8 h-8 bg-yellow-600 rounded"></div>
                        <div class="w-8 h-8 bg-green-600 rounded"></div>
                        <div class="w-8 h-8 bg-green-600 rounded"></div>
                    </td>
                    <td class="p-4 text-center"><button class="bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">Editar</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
