<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <script src='https://cdn.tailwindcss.com'></script>
    <title>TaxiFleet Manager</title>
</head>
<body class='bg-gray-100'>
    <div class='min-h-screen flex'>
        <aside class='w-64 bg-slate-800 text-white p-6'>
            <h1 class='text-2xl font-bold mb-8'>TaxiManager</h1>
            <nav><ul><li class='mb-4'>Dashboard</li><li class='mb-4'>Conductores</li><li class='mb-4'>Vehículos</li></ul></nav>
        </aside>
        <main class='flex-1 p-8'>
            <div class='grid grid-cols-4 gap-4 mb-8'>
                <div class='bg-white p-4 rounded shadow'>Ingresos: $15,000</div>
                <div class='bg-white p-4 rounded shadow'>Gastos: $4,000</div>
                <div class='bg-white p-4 rounded shadow'>Balance: $11,000</div>
                <div class='bg-white p-4 rounded shadow'>Deudas: $2,500</div>
            </div>
            <div class='bg-white p-6 rounded shadow'>
                <h2 class='text-xl mb-4'>Estado de Flota</h2>
                <table class='w-full text-left'>
                    <thead><tr><th>Taxi</th><th>Conductor</th><th>Km</th><th>Mantenimiento</th></tr></thead>
                    <tbody><tr><td>TAXI-001</td><td>Juan Pérez</td><td>120,000</td><td>15/10/2023</td></tr></tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
